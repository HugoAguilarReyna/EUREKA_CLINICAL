version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/eureka_secret
      - NEO4J_dbms_security_auth__minimum__password__length=8
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eureka
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=eureka_secret
    restart: unless-stopped

volumes:
  mongo_data:
  neo4j_data:
