version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: eureka_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  # Backend and Frontend are intentionally not dockerized for the MVP development phase,
  # run them locally using `uvicorn` and `npm run dev`.

volumes:
  mongodb_data:
